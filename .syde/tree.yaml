        summary: 'Post-plan completion audit. Walks approved/in-progress/completed plans and compares every declared Changes entry against current entity state at the single Finding level: Deleted targets must be gone, New entries must have a matching entity by slugified name, Extended targets must exist, declared field paths must resolve on the target struct, and every declared FieldChanges value must match the current value (with DELETE sentinel meaning zero-value). Extended entries with no declared field_changes are now silently skipped — the legacy rubber-stamp warning was dropped when severities collapsed to a single Finding level. Draft plans are excluded.'
