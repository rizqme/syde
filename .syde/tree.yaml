        summary: 'Planning-time audit: enforces non-empty requirements lane, validates new-entry drafts per kind (component responsibility; contract contract_kind/input/output; requirement EARS statement; concept meaning/invariants), checks every change.tasks slug references a real plan task, warns on requirement:change ratios below 1:3, and runs TF-IDF-ish term-overlap warnings on new requirements vs. active requirements. Adds contractCoverageFindings (requirement surfaces named in the statement must be covered by a contract in the plan or model) and flowCoverageFindings (every new/extended contract must be reached by a flow step in the plan or an active flow). The legacy ''extended without field_changes'' and ''internal flow step'' warnings were dropped with the collapse to a single Finding severity; all outputs now use SeverityFinding (Warning/Error kept as aliases). Also exports SignificantTerms/TermOverlap/TFIDFCorpus helpers shared by the post-plan overlap rule.'
